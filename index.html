        els.linkDeleteBtn.style.left = `${mid.x}px`;
        els.linkDeleteBtn.style.top = `${mid.y}px`;
        els.linkDeleteBtn.classList.add("show");
      } else {
        linkDeleteId = null;
        els.linkDeleteBtn.classList.remove("show");
      }
    } else {
      els.linkDeleteBtn.classList.remove("show");
    }

    if (gesture?.type === "bubble" && gesture.connecting) {
      const source = getBubble(gesture.id);
      if (source) {
        const a = worldToScreen(source.x, source.y);
        const b = { x: gesture.clientX, y: gesture.clientY };
        const temp = document.createElementNS("http://www.w3.org/2000/svg", "line");
        temp.setAttribute("x1", a.x);
        temp.setAttribute("y1", a.y);
        temp.setAttribute("x2", b.x);
        temp.setAttribute("y2", b.y);
        temp.setAttribute("stroke-width", Math.max(3, 3 * camera.zoom));
        temp.classList.add("link-visible", "selected");
        els.linkLayer.appendChild(temp);
      }
    }
  }

  function render() {
    updateMapTransform();
    drawLinks();
    renderBubbles();
    updateToolState();
  }

  function tick(now) {
    if (gesture?.type === "pumpHold" && gesture.started) {
      const b = getBubble(gesture.id);
      if (b) {
        if (b.type === "group") {
          const step = Math.max(1.4, b.r * .012);
          b.r = clamp(b.r + step, 130, 900);
          b.manualR = b.r;
        } else {
          b.r = clamp(b.r + .55, 34, 430);
          b.scale = clamp((b.scale || 1) + .01, .55, 4.8);
        }
        pushAwayFrom(b, 1);
        resizeAncestors(b);
      }
    }
    if (gesture?.type === "pinShrink" && gesture.started) {
      const b = getBubble(gesture.id);
      if (b) {
        if (b.type === "group") {
          // 中の子バブルを詰め直しながら、収まる限界まで縮める
          const step = Math.max(1.4, b.r * .012);
          applyManualGroupRadius(b, Math.max(130, b.r - step));
        } else {
          b.r = clamp(b.r - .62, 34, 430);
          b.scale = clamp((b.scale || 1) - .01, .55, 4.8);
        }
        resizeAncestors(b);
      }
    }

    for (const b of bubbles) {
      if (b.popping) continue;
      if (gesture?.type === "bubble" && gesture.id === b.id) continue;
      if (gesture?.type === "bubble" && gesture.movingIds?.includes(b.id)) continue;
      if (gesture?.type === "resize" && gesture.id === b.id) continue;
      b.x += b.vx || 0;
      b.y += b.vy || 0;
      b.vx *= .86;
      b.vy *= .86;
      if (b.type !== "group" && !b.parentId) {
        b.vx += Math.sin(now / 1250 + b.phase) * .0045;
        b.vy += Math.cos(now / 1430 + b.phase) * .0045;
      }
      const speed = Math.hypot(b.vx, b.vy);
      if (speed > .82) {
        b.vx *= .82 / speed;
        b.vy *= .82 / speed;
      }
      if (Math.abs(b.vx) < .001) b.vx = 0;
      if (Math.abs(b.vy) < .001) b.vy = 0;
      if (b.warp) {
        b.warp.amount *= .9;
        if (b.warp.amount < .01) delete b.warp;
      }
    }

    resolveOverlaps(3);
    render();
    if (now - lastFrameSave > 3500 && !gesture) {
      saveCurrentData();
      lastFrameSave = now;
    }
    requestAnimationFrame(tick);
  }

  function startBubbleGesture(event, bubble, el) {
    const movingIds = selectedIds.size > 1 && selectedIds.has(bubble.id)
      ? selectedTopLevelBubbles().map(b => b.id)
      : [bubble.id];
    if (event.pointerType !== "touch") {
      selectOnly(bubble.id);
      for (const id of movingIds) selectedIds.add(id);
      selectedId = bubble.id;
    } else if (selectionMode && selectedIds.has(bubble.id)) {
      selectedId = bubble.id;
    }
    dropTargetId = null;
    const start = screenToWorld(event.clientX, event.clientY);
    const longTimer = setTimeout(() => {
      if (event.pointerType !== "touch" && bubble.type !== "group" && gesture?.type === "bubble" && gesture.id === bubble.id && !gesture.movedFar) {
        gesture.connecting = true;
        gesture.clientX = event.clientX;
        gesture.clientY = event.clientY;
        showToast("つなぎ先で離す");
        render();
      }
    }, 450);
    gesture = {
      type: "bubble",
      id: bubble.id,
      pointerId: event.pointerId,
      startX: event.clientX,
      startY: event.clientY,
      clientX: event.clientX,
      clientY: event.clientY,
      offsetX: start.x - bubble.x,
      offsetY: start.y - bubble.y,
      movingIds,
      startCamera: { ...camera },
      lastWorldX: start.x,
      lastWorldY: start.y,
      lastT: performance.now(),
      movedFar: false,
      connecting: false,
      dragReady: event.pointerType !== "touch",
      parentRimState: {},
      longTimer
    };
    if (event.pointerType === "touch") {
      gesture.dragTimer = setTimeout(() => {
        if (gesture?.type === "bubble" && gesture.id === bubble.id && !gesture.movedFar) {
          gesture.dragReady = true;
          showToast("移動");
          if (bubble.type !== "group") {
            // そのまま動かさずに押し続けたら、PCと同じ「つなぐ」モードへ
            gesture.connectTimer = setTimeout(() => {
              if (gesture?.type === "bubble" && gesture.id === bubble.id && !gesture.movedFar && !gesture.connecting) {
                gesture.connecting = true;
                gesture.clientX = event.clientX;
                gesture.clientY = event.clientY;
                showToast("つなぎ先で離す");
                render();
              }
            }, 750);
          }
        }
      }, 180);
    }
    el.setPointerCapture(event.pointerId);
  }

  function startResizeGesture(event, bubble, el) {
    const w = screenToWorld(event.clientX, event.clientY);
    gesture = {
      type: "resize",
      id: bubble.id,
      pointerId: event.pointerId,
      startR: bubble.r,
      startScale: bubble.scale || 1,
      startDist: Math.max(1, Math.hypot(w.x - bubble.x, w.y - bubble.y))
    };
    el.setPointerCapture(event.pointerId);
  }

  function startPumpGesture(event, bubble, el) {
    resetModeIdleTimer();
    selectedId = bubble.id;
    selectedLinkId = null;
    const timer = setTimeout(() => {
      if (gesture?.type === "pumpHold" && gesture.id === bubble.id) {
        gesture.started = true;
        showToast("ふくらませ中");
      }
    }, 260);
    gesture = { type: "pumpHold", id: bubble.id, pointerId: event.pointerId, started: false, timer };
    el.setPointerCapture(event.pointerId);
  }

  function startPinGesture(event, bubble, el) {
    resetModeIdleTimer();
    selectedId = bubble.id;
    selectedLinkId = null;
    const timer = setTimeout(() => {
      if (gesture?.type === "pinShrink" && gesture.id === bubble.id) {
        gesture.started = true;
        showToast("空気抜き中");
      }
    }, 330);
    gesture = { type: "pinShrink", id: bubble.id, pointerId: event.pointerId, started: false, timer };
    el.setPointerCapture(event.pointerId);
  }

  function onBubblePointerDown(event) {
    clearTimeout(pendingGroupRenameTimer);
    linkDeleteId = null;
    const el = event.currentTarget;
    const bubble = getBubble(el.dataset.id);
    if (!bubble) return;
    event.preventDefault();
    event.stopPropagation();
    if (event.pointerType === "touch") {
      const now = performance.now();
      const tapDist = Math.hypot(event.clientX - lastTouchTap.x, event.clientY - lastTouchTap.y);
      const isDoubleTap = lastTouchTap.id === bubble.id && now - lastTouchTap.time < 320 && tapDist < 28;
      lastTouchTap = { id: bubble.id, time: now, x: event.clientX, y: event.clientY };
      if (isDoubleTap) {
        suppressDoubleClickUntil = now + 500;
        pointerMap.delete(event.pointerId);
        addSelectionModeBubble(bubble.id);
        return;
      }
      pointerMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (pointerMap.size >= 2) {
        const previousGesture = gesture;
        if (startPinchPanFromPointers()) {
          if (previousGesture?.longTimer) clearTimeout(previousGesture.longTimer);
          if (previousGesture?.dragTimer) clearTimeout(previousGesture.dragTimer);
          if (previousGesture?.connectTimer) clearTimeout(previousGesture.connectTimer);
          el.setPointerCapture(event.pointerId);
          render();
          return;
        }
      }
    }

    if (event.shiftKey) {
      toggleBubbleSelection(bubble.id);
      render();
      return;
    }
    if (pinMode) {
      startPinGesture(event, bubble, el);
      return;
    }
    if (pumpMode) {
      startPumpGesture(event, bubble, el);
      return;
    }
    startBubbleGesture(event, bubble, el);
    render();
  }

  function onBubblePointerMove(event) {
    if (!gesture) return;
    if (event.pointerType === "touch" && pointerMap.has(event.pointerId)) {
      pointerMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (gesture.type === "pinchpan") {
        event.preventDefault();
        event.stopPropagation();
        updateCanvasGesture(event);
        return;
      }
    }
    const bubble = getBubble(gesture.id);
    if (!bubble) return;
    event.preventDefault();
    event.stopPropagation();

    if (gesture.type === "resize") {
      const w = screenToWorld(event.clientX, event.clientY);
      const dist = Math.max(18, Math.hypot(w.x - bubble.x, w.y - bubble.y));
      const newR = clamp(gesture.startR * (dist / gesture.startDist), 34, bubble.type === "group" ? 900 : 430);
      if (bubble.type === "group") {
        applyManualGroupRadius(bubble, newR);
      } else {
        bubble.r = newR;
        bubble.scale = clamp(gesture.startScale * (newR / gesture.startR), .55, 4.8);
        if (bubble.type === "relation") bubble.lockedToLink = false;
      }
      pushAwayFrom(bubble, 2);
      resizeAncestors(bubble);
      render();
      return;
    }

    if (gesture.type !== "bubble" || gesture.id !== bubble.id) return;
    const now = performance.now();
    const moved = Math.hypot(event.clientX - gesture.startX, event.clientY - gesture.startY);
    if (moved > 8) gesture.movedFar = true;
    gesture.clientX = event.clientX;
    gesture.clientY = event.clientY;

    if (event.pointerType === "touch" && !gesture.dragReady) {
      if (moved > 8) {
        if (gesture.longTimer) clearTimeout(gesture.longTimer);
        if (gesture.dragTimer) clearTimeout(gesture.dragTimer);
        if (gesture.connectTimer) clearTimeout(gesture.connectTimer);
        gesture.touchPanned = true;
        camera.x = gesture.startCamera.x - (event.clientX - gesture.startX) / camera.zoom;
        camera.y = gesture.startCamera.y - (event.clientY - gesture.startY) / camera.zoom;
        render();
      }
      return;
    }

    if (gesture.connecting) {
      const target = hitBubbleAt(event.clientX, event.clientY, bubble.id, false);
      dropTargetId = target?.id || null;
      render();
      return;
    }

    const p = screenToWorld(event.clientX, event.clientY);
    const nextX = p.x - gesture.offsetX;
    const nextY = p.y - gesture.offsetY;
    const dx = nextX - bubble.x;
    const dy = nextY - bubble.y;
    const vx = (p.x - gesture.lastWorldX) / (Math.max(16, now - gesture.lastT) / 16) * .24;
    const vy = (p.y - gesture.lastWorldY) / (Math.max(16, now - gesture.lastT) / 16) * .24;
    const moving = (gesture.movingIds || [bubble.id]).map(getBubble).filter(Boolean);
    for (const item of moving) {
      item.vx = vx;
      item.vy = vy;
      moveTree(item, dx, dy);
      if (item.type === "relation") item.lockedToLink = false;
    }
    gesture.lastWorldX = p.x;
    gesture.lastWorldY = p.y;
    gesture.lastT = now;

    dropTargetId = null;
    const parent = bubble.parentId ? getBubble(bubble.parentId) : null;
    if (parent) updateRimInteraction(parent, bubble, dx, dy, .72);
    const targetContact = rimTargetForBubble(bubble, { margin: Math.max(20, bubble.r * .18) });
    if (targetContact && targetContact.group.id !== bubble.parentId) {
      dropTargetId = targetContact.group.id;
      updateRimInteraction(targetContact.group, bubble, dx, dy, .78);
    }
    if (bubble.type === "group") resizeAncestors(bubble);
    render();
  }

  function onBubblePointerUp(event) {
    if (!gesture) return;
    if (event.pointerType === "touch") pointerMap.delete(event.pointerId);
    if (gesture.type === "pinchpan") {
      event.preventDefault();
      event.stopPropagation();
      if (pointerMap.size < 2) {
        gesture = null;
        saveCurrentData();
        render();
      }
      return;
    }
    const bubble = getBubble(gesture.id);
    event.preventDefault();
    event.stopPropagation();
    if (gesture.longTimer) clearTimeout(gesture.longTimer);
    if (gesture.timer) clearTimeout(gesture.timer);
    if (gesture.dragTimer) clearTimeout(gesture.dragTimer);
    if (gesture.connectTimer) clearTimeout(gesture.connectTimer);

    if (gesture.touchPanned) {
      gesture = null;
      if (event.pointerType === "touch" && !selectionMode) clearSelection();
      saveCurrentData();
      render();
      return;
    }

    if (gesture.type === "pumpHold") {
      if (gesture.started) recordHistory();
      gesture = null;
      render();
      return;
    }

    if (gesture.type === "pinShrink") {
      const wasShrink = gesture.started;
      gesture = null;
      if (!bubble) return;
      if (wasShrink) {
        recordHistory();
        render();
      } else {
        removeBubble(bubble.id, true);
      }
      return;
    }

    if (gesture.type === "resize") {
      gesture = null;
      if (bubble) {
        resizeAncestors(bubble);
        resolveOverlaps(8);
        recordHistory();
        render();
      }
      return;
    }

    if (!bubble || gesture.type !== "bubble") {
      gesture = null;
      return;
    }

    if (gesture.connecting) {
      const target = hitBubbleAt(event.clientX, event.clientY, bubble.id, false);
      dropTargetId = null;
      clearDragWarps();
      gesture = null;
      if (target) createLink(bubble.id, target.id);
      else render();
      return;
    }

    if (bubble.type === "group" && !gesture.movedFar) {
      dropTargetId = null;
      clearDragWarps();
      gesture = null;
      if (event.pointerType === "touch") {
        if (!selectionMode) clearSelection();
        const groupId = bubble.id;
        clearTimeout(pendingGroupRenameTimer);
        pendingGroupRenameTimer = setTimeout(() => {
          const group = getBubble(groupId);
          if (group) editGroupName(group);
        }, 320);
      }
      render();
      return;
    }

    const gestureMovedFarSnapshot = gesture.movedFar;
    const moving = (gesture.movingIds || [bubble.id]).map(getBubble).filter(Boolean);
    const pointerWorld = screenToWorld(event.clientX, event.clientY);
    const group = dropGroupForBubble(bubble, pointerWorld);
    if (group) {
      for (const item of moving) {
        if (group.id !== item.parentId && item.id !== group.id && !isDescendant(group.id, item.id)) attachToGroup(item, group);
      }
      growGroupToFit(group, { includeMoving: true });
      settleParentContents(group.id, 22);
      growGroupToFit(group, { includeMoving: true });
    } else {
      for (const item of moving) {
        maybeDetachFromParent(item, pointerWorld);
        resizeAncestors(item);
      }
    }
    if (!gestureMovedFarSnapshot && bubble.type !== "group") lastTappedBubbleId = bubble.id;
    dropTargetId = null;
    clearDragWarps();
    gesture = null;
    if (event.pointerType === "touch" && !selectionMode) clearSelection();
    resolveOverlaps(10);
    normalizeGroupShellSizes();
    recordHistory();
    render();
  }

  function onBubbleDoubleClick(event) {
    if (performance.now() < suppressDoubleClickUntil) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }
    if (pinMode || pumpMode) return;
    const bubble = getBubble(event.currentTarget.dataset.id);
    if (!bubble) return;
    event.preventDefault();
    event.stopPropagation();
    if (bubble.type === "group") {
      editGroupName(bubble);
      return;
    }
    editBubbleText(bubble);
  }

  function editBubbleText(bubble) {
    openDialog({ title: "メモを編集", value: bubble.text || "", okLabel: "保存" }).then(next => {
      if (next === null) return;
      bubble.text = next.trim() || bubble.text;
      bubble.r = Math.max(bubble.r, radiusForText(bubble.text, bubble.scale || 1));
      recordHistory();
      render();
    });
  }

  function editGroupName(group) {
    openDialog({ title: "大バブルの名前", value: group.name || "大バブル", okLabel: "変更" }).then(name => {
      if (name === null) return;
      group.name = name.trim() || "大バブル";
      selectOnly(group.id);
      recordHistory();
      render();
    });
  }

  function drawLasso() {
    lassoCtx.clearRect(0, 0, board.w, board.h);
    if (lassoPoints.length < 2) return;
    lassoCtx.beginPath();
    lassoCtx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
    for (const point of lassoPoints) lassoCtx.lineTo(point.x, point.y);
    lassoCtx.closePath();
    lassoCtx.fillStyle = "rgba(53, 120, 229, .08)";
    lassoCtx.strokeStyle = "rgba(53, 120, 229, .72)";
    lassoCtx.lineWidth = 2;
    lassoCtx.fill();
    lassoCtx.stroke();
  }

  function pointInPoly(point, poly) {
    if (poly.length < 3) return false;
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i].x;
      const yi = poly[i].y;
      const xj = poly[j].x;
      const yj = poly[j].y;
      if (((yi > point.y) !== (yj > point.y)) && point.x < (xj - xi) * (point.y - yi) / (yj - yi + .000001) + xi) inside = !inside;
    }
    return inside;
  }

  function finishLasso() {
    lassoCtx.clearRect(0, 0, board.w, board.h);
    if (lassoPoints.length < 6) return;
    let picked = bubbles.filter(b => pointInPoly(worldToScreen(b.x, b.y), lassoPoints));
    picked = picked.filter(b => !picked.some(parent => parent.id !== b.id && isDescendant(b.id, parent.id)));
    if (!picked.length) {
      const worldPoints = lassoPoints.map(point => screenToWorld(point.x, point.y));
      const minX = Math.min(...worldPoints.map(p => p.x));
      const maxX = Math.max(...worldPoints.map(p => p.x));
      const minY = Math.min(...worldPoints.map(p => p.y));
      const maxY = Math.max(...worldPoints.map(p => p.y));
      const x = (minX + maxX) / 2;
      const y = (minY + maxY) / 2;
      const r = clamp(Math.max(135, Math.hypot(maxX - minX, maxY - minY) / 2), 130, 900);
      const group = createBubble("", x, y, "group", { r, manualR: r, name: "大バブル" });
      pulseGroup(group, 0, -1, .16);
      selectOnly(group.id);
      recordHistory();
      render();
      return;
    }
    const parentId = picked[0].parentId || null;
    picked = picked.filter(b => (b.parentId || null) === parentId);
    if (!picked.length) return;

    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    for (const b of picked) {
      minX = Math.min(minX, b.x - b.r);
      maxX = Math.max(maxX, b.x + b.r);
      minY = Math.min(minY, b.y - b.r);
      maxY = Math.max(maxY, b.y + b.r);
    }
    const x = (minX + maxX) / 2;
    const y = (minY + maxY) / 2;
    const r = Math.max(135, Math.hypot(maxX - minX, maxY - minY) / 2 + 48);
    const group = createBubble("", x, y, "group", { r, manualR: r, parentId, name: "大バブル" });
    for (const b of picked) setParent(b, group.id);
    applyManualGroupRadius(group, r);
    pulseGroup(group, 0, -1, .16);
    selectOnly(group.id);
    recordHistory();
    render();
  }

  function startCanvasGesture(event) {
    if (event.pointerType === "mouse" || !selectionMode) clearSelection();
    dropTargetId = null;
    pointerMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
    els.stage.setPointerCapture(event.pointerId);

    if (event.pointerType === "mouse") {
      if (event.button === 2 || (event.button === 0 && lassoMode)) {
        lassoPoints = [{ x: event.clientX, y: event.clientY }];
        gesture = { type: "lasso", pointerId: event.pointerId };
        drawLasso();
      } else {
        gesture = {
          type: "pan",
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          startCamera: { ...camera }
        };
      }
      render();
      return;
    }

    if (pointerMap.size === 1) {
      if (!lassoMode) {
        gesture = {
          type: "pan",
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          startCamera: { ...camera },
          touch: true
        };
        render();
        return;
      }
      lassoPoints = [{ x: event.clientX, y: event.clientY }];
      gesture = { type: "lasso", pointerId: event.pointerId, touch: true };
      drawLasso();
    } else if (pointerMap.size === 2) {
      const previousGesture = gesture;
      if (previousGesture?.longTimer) clearTimeout(previousGesture.longTimer);
      if (previousGesture?.dragTimer) clearTimeout(previousGesture.dragTimer);
      if (previousGesture?.connectTimer) clearTimeout(previousGesture.connectTimer);
      lassoPoints = [];
      lassoCtx.clearRect(0, 0, board.w, board.h);
      const points = [...pointerMap.values()];
      const cx = (points[0].x + points[1].x) / 2;
      const cy = (points[0].y + points[1].y) / 2;
      gesture = {
        type: "pinchpan",
        startDist: Math.max(10, Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y)),
        startZoom: camera.zoom,
        worldAtCenter: screenToWorld(cx, cy)
      };
    }
    render();
  }

  function startPinchPanFromPointers() {
    if (pointerMap.size < 2) return false;
    const points = [...pointerMap.values()].slice(0, 2);
    const cx = (points[0].x + points[1].x) / 2;
    const cy = (points[0].y + points[1].y) / 2;
    gesture = {
      type: "pinchpan",
      startDist: Math.max(10, Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y)),
      startZoom: camera.zoom,
      worldAtCenter: screenToWorld(cx, cy)
    };
    return true;
  }

  function updateCanvasGesture(event) {
    if (!pointerMap.has(event.pointerId)) return;
    pointerMap.set(event.pointerId, { x: event.clientX, y: event.clientY });

    if (gesture?.type === "lasso") {
      if (lassoMode) resetModeIdleTimer();
      lassoPoints.push({ x: event.clientX, y: event.clientY });
      drawLasso();
      return;
    }

    if (gesture?.type === "pan") {
      camera.x = gesture.startCamera.x - (event.clientX - gesture.startX) / camera.zoom;
      camera.y = gesture.startCamera.y - (event.clientY - gesture.startY) / camera.zoom;
      render();
      return;
    }

    if (gesture?.type === "pinchpan" && pointerMap.size >= 2) {
      const points = [...pointerMap.values()].slice(0, 2);
      const dist = Math.max(10, Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y));
      const cx = (points[0].x + points[1].x) / 2;
      const cy = (points[0].y + points[1].y) / 2;
      camera.zoom = clamp(gesture.startZoom * (dist / gesture.startDist), MIN_ZOOM, MAX_ZOOM);
      camera.x = gesture.worldAtCenter.x - (cx - board.w / 2) / camera.zoom;
      camera.y = gesture.worldAtCenter.y - (cy - board.h / 2) / camera.zoom;
      render();
    }

  }

  function endCanvasGesture(event) {
    pointerMap.delete(event.pointerId);
    if (gesture?.type === "lasso" && (event.pointerType === "mouse" || pointerMap.size === 0)) finishLasso();
    if (pointerMap.size === 0 || event.pointerType === "mouse") {
      const endedType = gesture?.type;
      const isEmptySelectionTap = selectionMode
        && endedType === "pan"
        && gesture?.touch
        && Math.hypot(event.clientX - gesture.startX, event.clientY - gesture.startY) < 8;
      const shouldRecord = endedType === "pan" || endedType === "pinchpan";
      gesture = null;
      if (isEmptySelectionTap) {
        exitSelectionMode();
        render();
        return;
      }
      if (shouldRecord) {
        saveCurrentData();
      }
    }
    render();
  }

  function alignableBubbles() {
    return selectedTopLevelBubbles();
  }

  function alignmentPlan(axis) {
    const items = alignableBubbles();
    if (items.length < 2) return null;
    const sorted = [...items].sort((a, b) => axis === "horizontal" ? a.x - b.x : a.y - b.y);
    const centerX = sorted.reduce((sum, b) => sum + b.x, 0) / sorted.length;
    const centerY = sorted.reduce((sum, b) => sum + b.y, 0) / sorted.length;
    const first = sorted[0];
    const last = sorted[sorted.length - 1];
    const currentRange = axis === "horizontal" ? Math.abs(last.x - first.x) : Math.abs(last.y - first.y);
    const minSpacing = Math.max(56, ...sorted.map(b => b.r * 2 + 12));
    const spacing = Math.max(minSpacing, currentRange / Math.max(1, sorted.length - 1));
    return { sorted, centerX, centerY, spacing, minSpacing };
  }

  function applyAlignment(axis, spacing = null, plan = null) {
    const info = plan || alignmentPlan(axis);
    if (!info) {
      showToast("バブルを2つ以上選択してください");
      return null;
    }
    const gap = Math.max(info.minSpacing, spacing ?? info.spacing);
    const start = -gap * (info.sorted.length - 1) / 2;
    info.sorted.forEach((bubble, index) => {
      if (axis === "horizontal") {
        bubble.x = info.centerX + start + gap * index;
        bubble.y = info.centerY;
      } else {
        bubble.x = info.centerX;
        bubble.y = info.centerY + start + gap * index;
      }
      bubble.vx = 0;
      bubble.vy = 0;
      if (bubble.type === "relation") bubble.lockedToLink = false;
      resizeAncestors(bubble);
    });
    resolveOverlaps(2);
    render();
    return { ...info, spacing: gap };
  }

  function startSelectionSizeGesture(event) {
    if (!selectionMode) return;
    const selected = selectedTopLevelBubbles();
    if (!selected.length) return;
    event.preventDefault();
    event.stopPropagation();
    gesture = {
      type: "selectionSize",
      pointerId: event.pointerId,
      startY: event.clientY,
      bubbles: selected.map(b => ({ id: b.id, r: b.r, scale: b.scale || 1 }))
    };
    els.selectionSizeSlider.setPointerCapture(event.pointerId);
  }

  function updateSelectionSizeGesture(event) {
    if (gesture?.type !== "selectionSize" || gesture.pointerId !== event.pointerId) return false;
    event.preventDefault();
    const ratio = clamp(1 + (gesture.startY - event.clientY) / 140, .35, 3.2);
    for (const start of gesture.bubbles) {
      const bubble = getBubble(start.id);
      if (!bubble) continue;
      if (bubble.type === "group") {
        applyManualGroupRadius(bubble, start.r * ratio);
      } else {
        bubble.r = clamp(start.r * ratio, 34, 430);
        bubble.scale = clamp(start.scale * ratio, .55, 4.8);
        if (bubble.type === "relation") bubble.lockedToLink = false;
      }
      resizeAncestors(bubble);
    }
    resolveOverlaps(2);
    render();
    return true;
  }

  function endSelectionSizeGesture(event) {
    if (gesture?.type !== "selectionSize" || gesture.pointerId !== event.pointerId) return false;
    event.preventDefault();
    gesture = null;
    recordHistory();
    render();
    return true;
  }

  function startAlignGesture(event, axis) {
    event.preventDefault();
    event.stopPropagation();
    const plan = alignmentPlan(axis);
    if (!plan) {
      showToast("Shiftでバブルを2つ以上選択");
      return;
    }
    const applied = applyAlignment(axis, null, plan);
    gesture = {
      type: "align",
      axis,
      pointerId: event.pointerId,
      startX: event.clientX,
      startY: event.clientY,
      startSpacing: applied.spacing,
      plan: applied,
      moved: false
    };
    event.currentTarget.setPointerCapture(event.pointerId);
    els.alignTool.classList.add("open");
  }

  function updateAlignGesture(event) {
    if (gesture?.type !== "align" || gesture.pointerId !== event.pointerId) return false;
    event.preventDefault();
    const delta = gesture.axis === "horizontal" ? event.clientX - gesture.startX : event.clientY - gesture.startY;
    if (Math.abs(delta) > 2) gesture.moved = true;
    const spacing = gesture.startSpacing + delta / camera.zoom;
    applyAlignment(gesture.axis, spacing, gesture.plan);
    return true;
  }

  function endAlignGesture(event) {
    if (gesture?.type !== "align" || gesture.pointerId !== event.pointerId) return false;
    event.preventDefault();
    gesture = null;
    els.alignTool.classList.remove("open");
    recordHistory();
    render();
    return true;
  }

  function fitToBubbles() {
    const roots = bubbles.filter(b => !b.parentId);
    const items = roots.length ? roots : bubbles;
    if (!items.length) {
      camera = { x: 0, y: 0, zoom: 1 };
      render();
      return;
    }
    const minX = Math.min(...items.map(b => b.x - b.r));
    const maxX = Math.max(...items.map(b => b.x + b.r));
    const minY = Math.min(...items.map(b => b.y - b.r));
    const maxY = Math.max(...items.map(b => b.y + b.r));
    camera.x = (minX + maxX) / 2;
    camera.y = (minY + maxY) / 2;
    camera.zoom = clamp(Math.min(board.w / Math.max(320, maxX - minX + 240), board.h / Math.max(320, maxY - minY + 240)), MIN_ZOOM, 5);
    saveCurrentData();
    render();
  }

  function resizeBoard() {
    board = { w: window.innerWidth, h: window.innerHeight };
    const ratio = window.devicePixelRatio || 1;
    els.lassoCanvas.width = Math.round(board.w * ratio);
    els.lassoCanvas.height = Math.round(board.h * ratio);
    els.lassoCanvas.style.width = `${board.w}px`;
    els.lassoCanvas.style.height = `${board.h}px`;
    lassoCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
    render();
  }

  els.dialogOkBtn.addEventListener("click", event => {
    event.preventDefault();
    closeDialog(dialogState?.withInput ? els.dialogInput.value : true);
  });
  els.dialogCancelBtn.addEventListener("click", event => {

    closeDialog(null);
  });

      event.preventDefault();

    }
  });

  function insertMemoNewline() {
    const input = els.input;
    if (document.activeElement !== input) input.focus({ preventScroll: true });
    let inserted = false;
    try {
      // 編集操作として挿入（IMEやアンドゥ履歴と整合する）
      inserted = document.execCommand("insertText", false, "\n");
    } catch {
      inserted = false;
    }
    if (!inserted) {
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      input.value = `${input.value.slice(0, start)}\n${input.value.slice(end)}`;
      const pos = start + 1;
      try {
        input.setSelectionRange(pos, pos);
      } catch {
        /* noop */
      }
    }
    syncMemoInputHeight();
  }

  let touchNewlineUntil = 0;
  els.newlineBtn.addEventListener("pointerdown", event => {
    // ボタンにフォーカスを奪わせない（PC向け）
    event.preventDefault();
  });
  els.newlineBtn.addEventListener("touchstart", event => {
    event.preventDefault();
    event.stopPropagation();
    touchNewlineUntil = performance.now() + 700;
    insertMemoNewline();
  }, { passive: false });
  els.newlineBtn.addEventListener("touchend", event => {
    event.preventDefault();
  }, { passive: false });
  els.newlineBtn.addEventListener("click", event => {
    event.preventDefault();
    if (performance.now() < touchNewlineUntil) return;
    insertMemoNewline();
  });
  attachMemoInputEvents(els.input);

  els.stage.addEventListener("contextmenu", event => event.preventDefault());
  els.stage.addEventListener("wheel", event => {
    event.preventDefault();
    const before = screenToWorld(event.clientX, event.clientY);
    const factor = Math.exp(-event.deltaY * .001);
    camera.zoom = clamp(camera.zoom * factor, MIN_ZOOM, MAX_ZOOM);
    const after = screenToWorld(event.clientX, event.clientY);
    camera.x -= after.x - before.x;
    camera.y -= after.y - before.y;
    saveCurrentData();
    render();
  }, { passive: false });

  els.stage.addEventListener("pointerdown", event => {
    if (event.target !== els.stage) return;

    clearTimeout(pendingGroupRenameTimer);

  });
  els.stage.addEventListener("pointermove", event => {

  });
  els.stage.addEventListener("pointerup", event => {
    if (!pointerMap.has(event.pointerId)) return;

  els.stage.addEventListener("pointercancel", event => {

  window.addEventListener("keydown", event => {
    if (!(event.ctrlKey || event.metaKey)) return;
    const key = event.key.toLowerCase();
    if (key !== "z" && key !== "y") return;
    if (dialogState) return; // ダイアログ編集中はテキストのundoを優先
    if (document.activeElement === els.input && els.input.value) return; // 入力中の文字はネイティブundo
    event.preventDefault();
    if (key === "y" || (key === "z" && event.shiftKey)) {
      redo();
    } else {
      undo();
    }
  });

  window.addEventListener("resize", resizeBoard);

  // iOS Safariはキーボード表示時にページごと上へパンしてしまい、
  // 入力バーとキーボードの間に隙間ができたり、座標系がずれて
  // ピンチの中心がおかしくなる。visualViewportでキーボードの高さを
  // 測って入力バーを自前でキーボード直上に置き、パンは毎回打ち消す。
  function syncKeyboardInset() {
    const vv = window.visualViewport;
    if (!vv) return;

    const keyboardOpen = document.activeElement === els.input && vv.height < window.screen.height * .82;
    if (keyboardOpen) {
      // iOSではキーボード表示時に visualViewport の縮小とページ側のパンが
      // 同時に起きる端末があるため、bottom の加算ではなく表示領域の下端から
      // 入力バー位置を直接決める。これで二重補正による画面外移動を防ぐ。
      document.documentElement.style.setProperty("--kb-inset", "0px");
      els.inputBar.style.bottom = "auto";
      const top = Math.max(8, Math.round(vv.offsetTop + vv.height - els.inputBar.offsetHeight - 8));
      els.inputBar.style.top = `${top}px`;
    } else {
      els.inputBar.style.top = "";
      els.inputBar.style.bottom = "";
      document.documentElement.style.setProperty("--kb-inset", "0px");
    }

    if (window.scrollY || window.scrollX) window.scrollTo(0, 0);
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", syncKeyboardInset);
    window.visualViewport.addEventListener("scroll", syncKeyboardInset);
    els.input.addEventListener("focus", syncKeyboardInset);
    els.input.addEventListener("blur", syncKeyboardInset);
    syncKeyboardInset();
  }
  window.addEventListener("pointermove", event => {
    updateSelectionSizeGesture(event);
    updateAlignGesture(event);
  });
  window.addEventListener("pointerup", event => {
    if (endSelectionSizeGesture(event)) return;
    if (gesture?.type === "selectionClear" && gesture.pointerId === event.pointerId) {
      const dx = event.clientX - gesture.startX;
      gesture = null;
      if (dx < -35) {
        undoSelectionStep();
        showToast("選択を1つ戻しました");
      } else {
        exitSelectionMode();
        showToast("選択解除");
        render();
      }
      return;
    }
    endAlignGesture(event);
  });
  document.addEventListener("gesturestart", event => event.preventDefault());
  document.addEventListener("selectstart", event => {
    if (event.target.closest("input, textarea, select")) return;
    event.preventDefault();
  });

  window.addEventListener("hashchange", () => {
    importFromShareHash();
  });

  loadBoardsIndex();
  importFromShareHash().then(handled => {
    if (!handled) loadBoard(currentBoardId);
  });
  resizeBoard();
  els.input.focus({ preventScroll: true });
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
